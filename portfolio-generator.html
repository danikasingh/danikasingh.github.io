<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portfolio Generator</title>
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7f7fb;margin:18px;color:#111}
    .card{background:#fff;padding:16px;border-radius:10px;box-shadow:0 6px 20px rgba(2,6,23,0.06);max-width:1100px;margin:0 auto}
    label{display:block;margin-top:10px;font-size:13px}
    input,textarea,select{width:100%;padding:8px;border-radius:6px;border:1px solid #e6e6f0}
    .row{display:flex;gap:8px}
    button{background:#4f46e5;color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
    .small{padding:6px 8px;font-size:13px}
    iframe{width:100%;height:560px;border:1px solid #e6e6f0;border-radius:8px;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Portfolio Generator</h2>
    <p style="margin-top:0;color:#374151">Fill baseline fields and either preview or download a standalone site using the project template.</p>

    <label>Saved profiles</label>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="profiles" style="flex:1"></select>
      <button id="load" class="small">Load</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
      <button id="save" class="small">Save</button>
      <button id="del" class="small" style="background:#ef4444">Delete</button>
      <input id="importFile" type="file" accept="application/json" style="display:none">
      <button id="importBtn" class="small" style="background:#f59e0b">Import</button>
      <button id="export" class="small" style="background:#06b6d4">Export</button>
      <input id="zipName" placeholder="zip name (optional)" style="width:180px;border-radius:6px;padding:8px;border:1px solid #e6e6f0">
      <button id="batch" class="small" style="background:#06b6d4">Batch: Download ZIP</button>
    </div>

    <hr style="margin:12px 0">

    <label>Full name</label>
    <input id="name" placeholder="Full name">
    <label>Title / Tagline</label>
    <input id="title" placeholder="Role / tagline">
    <label>Photo URL</label>
    <input id="photo" placeholder="images/profile.jpg or https://...">
    <label>Short bio (plain text)</label>
    <textarea id="bio" rows="3" placeholder="A short bio or summary"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input id="skills" placeholder="Skills (comma-separated)" style="flex:1">
      <input id="linkedin" placeholder="LinkedIn URL" style="width:260px">
    </div>

    <label style="margin-top:10px">Projects (one per line: title | problem | action | result | link optional)</label>
    <textarea id="projects" rows="4" placeholder="Project A | Problem | Action | Result | https://..."></textarea>

    <label style="margin-top:10px">Experience (one per line: company | years | role | bullets semicolon-separated)</label>
    <textarea id="experience" rows="4" placeholder="Arealytics | 2021–Present | Operations Manager | Designed L&D;Managed budgets"></textarea>

    <label style="margin-top:10px">Education (one per line: degree | institution | years)</label>
    <textarea id="education" rows="3" placeholder="BCom: Business Management | UNISA | 2016–2019"></textarea>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="previewBtn">Preview</button>
      <button id="downloadBtn">Download HTML</button>
      <button id="resetBtn" style="background:#ef4444">Reset</button>
    </div>

    <iframe id="previewFrame" sandbox></iframe>
  </div>

<script>
  // helpers
  const profilesEl = document.getElementById('profiles');
  const saveBtn = document.getElementById('save');
  const loadBtn = document.getElementById('load');
  const delBtn = document.getElementById('del');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  const exportBtn = document.getElementById('export');
  const batchBtn = document.getElementById('batch');
  const zipNameEl = document.getElementById('zipName');
  const previewBtn = document.getElementById('previewBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');
  const previewFrame = document.getElementById('previewFrame');

  function key(){ return 'pg_profiles_v1'; }
  function loadProfiles(){
    const raw = localStorage.getItem(key())||'{}';
    let obj = {};
    try{ obj = JSON.parse(raw); }catch(e){ obj = {}; }
    profilesEl.innerHTML = '';
    const empty = document.createElement('option'); empty.value=''; empty.textContent='— select profile —'; profilesEl.appendChild(empty);
    Object.keys(obj).forEach(k=>{ const o = document.createElement('option'); o.value = k; o.textContent = k; profilesEl.appendChild(o); });
  }

  function collect(){
    const name = document.getElementById('name').value.trim();
    const title = document.getElementById('title').value.trim();
    const photo = document.getElementById('photo').value.trim();
    const bio = document.getElementById('bio').value.trim();
    const skills = document.getElementById('skills').value.split(',').map(s=>s.trim()).filter(Boolean);
    const linkedin = document.getElementById('linkedin').value.trim();
    const projects = (document.getElementById('projects').value||'').split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
      const parts = line.split('|').map(p=>p.trim());
      return { title: parts[0]||'', problem: parts[1]||'', action: parts[2]||'', result: parts[3]||'', link: parts[4]||'' };
    });
    const experience = (document.getElementById('experience').value||'').split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
      const parts = line.split('|').map(p=>p.trim());
      return { company: parts[0]||'', years: parts[1]||'', role: parts[2]||'', bullets: (parts[3]||'').split(';').map(s=>s.trim()).filter(Boolean) };
    });
    const education = (document.getElementById('education').value||'').split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
      const parts = line.split('|').map(p=>p.trim());
      return { degree: parts[0]||'', institution: parts[1]||'', years: parts[2]||'' };
    });
    return {name,title,photo,bio,skills,linkedin,projects};
  }

  saveBtn.addEventListener('click', ()=>{
    const data = collect();
    const name = prompt('Save profile name', data.name || 'New Profile'); if(!name) return;
    const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); obj[name]=data; localStorage.setItem(key(), JSON.stringify(obj)); loadProfiles(); profilesEl.value = name; alert('Saved '+name);
  });

  loadBtn.addEventListener('click', ()=>{
    const k = profilesEl.value; if(!k) return alert('Choose a profile');
    const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); const d = obj[k]; if(!d) return alert('Not found');
    document.getElementById('name').value = d.name||'';
    document.getElementById('title').value = d.title||'';
    document.getElementById('photo').value = d.photo||'';
    document.getElementById('bio').value = d.bio||'';
    document.getElementById('skills').value = (d.skills||[]).join(', ');
    document.getElementById('linkedin').value = d.linkedin||'';
    document.getElementById('projects').value = (d.projects||[]).map(p=>[p.title,p.problem,p.action,p.result,p.link].filter(Boolean).join(' | ')).join('\n');
    document.getElementById('experience').value = (d.experience||[]).map(e=>[e.company,e.years,e.role,(e.bullets||[]).join('; ')].filter(Boolean).join(' | ')).join('\n');
    document.getElementById('education').value = (d.education||[]).map(ed=>[ed.degree,ed.institution,ed.years].filter(Boolean).join(' | ')).join('\n');
  });

  delBtn.addEventListener('click', ()=>{
    const k = profilesEl.value; if(!k) return alert('Choose a profile'); if(!confirm('Delete '+k+'?')) return; const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); delete obj[k]; localStorage.setItem(key(), JSON.stringify(obj)); loadProfiles(); alert('Deleted');
  });

  importBtn.addEventListener('click', ()=> importFile.click());
  importFile.addEventListener('change', async e=>{ const f = e.target.files[0]; if(!f) return; const text = await f.text(); try{ const data = JSON.parse(text); const name = prompt('Import as name', f.name.replace(/\.json$/i,'')); if(!name) return; const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); obj[name]=data; localStorage.setItem(key(), JSON.stringify(obj)); loadProfiles(); alert('Imported'); }catch(err){ alert('Invalid JSON'); } importFile.value=''; });

  exportBtn.addEventListener('click', ()=>{ const k = profilesEl.value; if(!k) return alert('Choose a profile'); const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); const data = obj[k]; if(!data) return alert('Not found'); const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download = k.replace(/\s+/g,'-')+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); });

  // build using index-template.html
  async function buildFromTemplate(data){
    try{
      const resp = await fetch('index-template.html', {cache:'no-store'});
      if(!resp.ok) throw new Error('no template');
      let t = await resp.text();
      function esc(s){ return (s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
      // simple tokens
      t = t.replaceAll(/{{NAME}}/g, esc(data.name||''));
      t = t.replaceAll(/{{TITLE}}/g, esc(data.title||''));
      t = t.replaceAll(/{{PHOTO_URL}}/g, data.photo||'');
      t = t.replaceAll(/{{RESUME_URL}}/g, '');
      // BIO -> allow paragraphs
      const bioHtml = (data.bio||'').split(/\n{2,}/).map(p=>`<p>${esc(p).replace(/\n/g,'<br>')}</p>`).join('\n');
      t = t.replaceAll(/{{BIO_HTML}}/g, bioHtml);
      t = t.replaceAll(/{{CONTACT_EMAIL}}/g, esc(data.email||data.linkedin||''));
      t = t.replaceAll(/{{LINKEDIN_URL}}/g, esc(data.linkedin||''));
      t = t.replaceAll(/{{CONTACT_PHONE}}/g, esc(data.phone||''));
      t = t.replaceAll(/{{LOCATION}}/g, esc(data.location||''));

      // helper to expand blocks
      function expand(template, startMarker, endMarker, items, render){
        const s = `<!-- ${startMarker} -->`;
        const e = `<!-- ${endMarker} -->`;
        const i0 = template.indexOf(s);
        const i1 = template.indexOf(e);
        if(i0 === -1 || i1 === -1 || i1 <= i0) return template;
        const block = template.slice(i0 + s.length, i1);
        const built = (items||[]).map(render).join('\n');
        return template.slice(0,i0) + built + template.slice(i1 + e.length);
      }

      // projects
      t = expand(t, 'PROJ_START', 'PROJ_END', data.projects, p => {
        return `\n    <h3>${esc(p.title)}</h3>\n    <p><strong>Problem:</strong> ${esc(p.problem)}</p>\n    <p><strong>Action:</strong> ${esc(p.action)}</p>\n    <p><strong>Result:</strong> ${esc(p.result)}</p>\n    ${p.link?`<p><a href="${esc(p.link)}" target="_blank">View project</a></p>`:''}`;
      });

      // experience
      t = expand(t, 'EXP_START', 'EXP_END', data.experience, ex => {
        const bullets = (ex.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('\n');
        return `\n    <h3>${esc(ex.company)} (${esc(ex.years)})</h3>\n    <p><strong>${esc(ex.role)}</strong></p>\n    <ul>\n      ${bullets}\n    </ul>`;
      });

      // education
      t = expand(t, 'EDU_START', 'EDU_END', data.education, ed => {
        return `\n    <p><strong>${esc(ed.degree)}</strong> – ${esc(ed.institution)} (${esc(ed.years)})</p>`;
      });

      // skills
      t = expand(t, 'SKILL_START', 'SKILL_END', data.skills, s => `<li>${esc(s)}</li>`);

      return t;
    }catch(e){
      // fallback simple html
      const esc = s=> (s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
      const skillsHtml = (data.skills||[]).map(s=>`<li>${esc(s)}</li>`).join('\n');
      const projectsHtml = (data.projects||[]).map(p=>`<article style="margin-bottom:14px"><h3>${esc(p.title)}</h3><p><strong>Problem:</strong> ${esc(p.problem)}</p><p><strong>Action:</strong> ${esc(p.action)}</p><p><strong>Result:</strong> ${esc(p.result)}</p>${p.link?`<p><a href="${esc(p.link)}">View project</a></p>`:''}</article>`).join('\n');
      return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(data.name)} — ${esc(data.title)}</title><style>body{font-family:Inter,Arial;padding:24px;background:#f7f7fb;color:#0f172a}.wrap{max-width:900px;margin:0 auto;background:#fff;padding:24px;border-radius:12px}</style></head><body><div class="wrap"><header><h1>${esc(data.name)}</h1><h2>${esc(data.title)}</h2><p>${esc(data.bio)}</p></header><section><h3>Skills</h3><ul>${skillsHtml}</ul></section><section><h3>Projects</h3>${projectsHtml}</section></div></body></html>`;
    }
  }

  // preview and download
  previewBtn.addEventListener('click', async ()=>{
    const data = collect();
    const html = await buildFromTemplate(data);
    previewFrame.srcdoc = html;
  });

  downloadBtn.addEventListener('click', async ()=>{
    const data = collect();
    const html = await buildFromTemplate(data);
    const nameSafe = (data.name||'portfolio').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'portfolio';
    const blob = new Blob([html],{type:'text/html'});
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download = `${nameSafe}-index.html`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  });

  resetBtn.addEventListener('click', ()=>{ if(!confirm('Reset form?')) return; document.querySelectorAll('input,textarea').forEach(i=>i.value=''); previewFrame.srcdoc=''; });

  // batch zip
  async function ensureJsZip(){ if(window.JSZip) return window.JSZip; return new Promise((res,reject)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'; s.onload=()=>res(window.JSZip); s.onerror=()=>reject(new Error('failed')); document.head.appendChild(s); }); }
  batchBtn.addEventListener('click', async ()=>{
    const raw = localStorage.getItem(key())||'{}'; const obj = JSON.parse(raw||'{}'); const keys = Object.keys(obj); if(!keys.length) return alert('No saved profiles'); batchBtn.disabled=true; batchBtn.textContent='Preparing...';
    try{
      await ensureJsZip(); const zip = new JSZip(); const links = [];
      for(const k of keys){ const data = obj[k]; const html = await buildFromTemplate(data); const safe = (data.name||k).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||k.replace(/\s+/g,'-'); const fname = safe + '.html'; zip.file(fname, html); links.push({name:k,file:fname}); }
      const idx = `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portfolios</title></head><body><h1>Portfolios</h1><ul>${links.map(i=>`<li><a href="${i.file}">${i.name}</a></li>`).join('\n')}</ul></body></html>`;
      zip.file('index.html', idx);
      const content = await zip.generateAsync({type:'blob'});
      const url = URL.createObjectURL(content); const a=document.createElement('a'); a.href=url; let z = (zipNameEl.value||'portfolios').trim(); if(!/\.zip$/i.test(z)) z = z + '.zip'; a.download = z; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }catch(err){ alert('Error: '+err.message); }
    batchBtn.disabled=false; batchBtn.textContent='Batch: Download ZIP';
  });

  // init
  loadProfiles();
</script>
</body>
</html>
